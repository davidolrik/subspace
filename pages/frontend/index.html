<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subspace Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="static/fonts/fontawesome.min.css">
    <link rel="stylesheet" href="static/fonts/simple-icons.min.css">
    <link rel="stylesheet" href="static/fonts/materialdesignicons.min.css">
    <link rel="stylesheet" href="static/fonts/nerdfonts.min.css">
</head>
<body x-data="{...dashboard(), ...search()}" x-init="loadLinks(); initSearch()">
    <div class="config-error-banner" x-show="configErrors.length > 0" x-cloak>
        <div class="config-error-banner-title">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span x-text="`Config error${configErrors.length === 1 ? '' : 's'} (${configErrors.length})`"></span>
        </div>
        <ul>
            <template x-for="(msg, idx) in configErrors" :key="idx">
                <li x-text="msg"></li>
            </template>
        </ul>
    </div>
    <header>
        <h1>
            <span class="sub">sub</span><span class="space">space</span>
            <template x-if="title">
                <span><span class="title-dash">-</span> <span class="title" x-text="title"></span></span>
            </template>
        </h1>
        <span class="search-hint" @click="show()">Press <kbd>/</kbd> to search</span>
        <nav>
            <template x-for="item in nav" :key="item.url">
                <a :href="item.url" :class="{ active: item.active }" :title="item.label">
                    <template x-if="item.icon">
                        <i :class="iconClass(item.icon)"></i>
                    </template>
                    <template x-if="!item.icon">
                        <span x-text="item.label"></span>
                    </template>
                </a>
            </template>
        </nav>
    </header>
    <main>
        <div class="grid" x-show="groups.length > 0">
            <template x-for="group in groups" :key="group.Name">
                <section class="group" :style="group.Color ? `border-top: 2px solid ${group.Color}; box-shadow: 0 0 12px ${group.Color}15; background: linear-gradient(180deg, ${group.Color}1a, transparent)` : ''">
                    <template x-if="group.Icon">
                        <i :class="iconClass(group.Icon)" class="group-icon"
                           :style="group.Color ? `color: ${group.Color}; text-shadow: 0 0 8px ${group.Color}` : ''"></i>
                    </template>
                    <h2 x-text="group.Name"></h2>
                    <ul>
                        <template x-for="link in group.Links" :key="link.URL">
                            <li>
                                <a :href="link.URL">
                                    <template x-if="link.Icon">
                                        <i :class="iconClass(link.Icon)" class="link-icon"></i>
                                    </template>
                                    <template x-if="!link.Icon">
                                        <span class="default-icon">&#x2022;</span>
                                    </template>
                                    <span class="link-text">
                                        <span class="link-name" x-text="link.Name"></span>
                                        <template x-if="link.Description">
                                            <span class="link-desc" x-text="link.Description"></span>
                                        </template>
                                    </span>
                                </a>
                                <template x-if="link.Tags && link.Tags.length">
                                    <span class="link-tags">
                                        <template x-for="t in link.Tags" :key="t">
                                            <span class="tag-pill" :style="`--tag-color: ${tagColor(t)}`" x-text="tagLabel(t)"></span>
                                        </template>
                                    </span>
                                </template>
                            </li>
                        </template>
                    </ul>
                    <template x-if="group.Tags && group.Tags.length">
                        <div class="group-tags">
                            <template x-for="t in group.Tags" :key="t">
                                <span class="tag-pill" :style="`--tag-color: ${tagColor(t)}`" x-text="tagLabel(t)"></span>
                            </template>
                        </div>
                    </template>
                </section>
            </template>
        </div>
        <p class="empty" x-show="groups.length === 0">No links configured.</p>
    </main>
    <footer x-show="footer" x-text="footer"></footer>

    <!-- Search popup -->
    <template x-if="open">
        <div class="search-backdrop" @click.self="hide()">
            <div class="search-dialog" :class="{ flashing }" @keydown="onKeydown($event)">
                <div class="search-input-wrap">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input
                        x-ref="searchInput"
                        x-model="query"
                        @input="onInput()"
                        type="text"
                        placeholder="Search pages..."
                        autocomplete="off"
                        spellcheck="false">
                    <kbd>esc</kbd>
                </div>
                <div class="search-results" x-ref="searchResults">
                    <template x-for="(item, idx) in filteredResults()" :key="item.type + ':' + (item.url || item.label)">
                        <a :href="resultURL(item)"
                           class="search-result"
                           :class="{ selected: idx === selectedIndex, engine: item.type === 'engine' || item.type === 'engine-prefix' }"
                           @mouseenter="selectedIndex = idx"
                           @click.prevent="navigate(item)">
                            <template x-if="iconImageURL(item)">
                                <img :src="iconImageURL(item)"
                                     class="search-result-icon search-result-favicon"
                                     referrerpolicy="no-referrer"
                                     loading="lazy"
                                     @error="onFaviconError(item)"
                                     alt="">
                            </template>
                            <template x-if="!iconImageURL(item)">
                                <i :class="iconClass(item.icon, item.type)"
                                   class="search-result-icon"></i>
                            </template>
                            <div class="search-result-text">
                                <div class="search-result-label" x-text="item.label"></div>
                                <div class="search-result-meta" x-text="item.meta"></div>
                                <template x-if="item.description">
                                    <div class="search-result-desc" x-text="item.description"></div>
                                </template>
                            </div>
                            <span class="search-result-enter">&crarr;</span>
                        </a>
                    </template>
                    <div class="search-empty" x-show="filteredResults().length === 0">
                        No results
                    </div>
                </div>
                <div class="search-footer">
                    <kbd>tab</kbd> autocomplete <span>·</span> <kbd>&crarr;</kbd> open <span>·</span> <kbd>&#8984;&crarr;</kbd>/<kbd>ctrl&crarr;</kbd> new tab <span>·</span> <kbd>esc</kbd> close
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="static/search.js"></script>
    <script src="static/alpine.min.js" defer></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('dashboard', () => ({
                title: '',
                footer: '',
                groups: [],
                nav: [],
                tags: {},
                configErrors: [],
                async loadLinks() {
                    try {
                        const [linksResp, navResp, errorsResp] = await Promise.all([
                            fetch('api/links').then(r => r.json()),
                            fetch('api/nav').then(r => r.json()),
                            fetch('api/config-errors').then(r => r.json()).catch(() => null),
                        ]);
                        this.title = linksResp.Title || '';
                        this.footer = linksResp.Footer || '';
                        this.groups = linksResp.Sections || [];
                        this.tags = linksResp.Tags || {};
                        this.nav = navResp || [];
                        this.configErrors = (errorsResp && errorsResp.errors) || [];
                    } catch (e) {
                        console.error('Failed to load links:', e);
                    }
                },
                tagColor(name) {
                    return (this.tags[name] && this.tags[name].Color) || 'var(--text-muted)';
                },
                tagLabel(name) {
                    return (this.tags[name] && this.tags[name].Alias) || name;
                },
                iconClass(icon) {
                    if (icon.startsWith('si-')) return 'si ' + icon;
                    if (icon.startsWith('fa-')) return 'fa-solid ' + icon;
                    if (icon.startsWith('mdi-')) return 'mdi ' + icon;
                    if (icon.startsWith('nf-')) return 'nf ' + icon;
                    return icon;
                }
            }));
        });
    </script>
</body>
</html>
