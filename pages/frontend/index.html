<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subspace Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="static/fonts/fontawesome.min.css">
    <link rel="stylesheet" href="static/fonts/simple-icons.min.css">
    <link rel="stylesheet" href="static/fonts/materialdesignicons.min.css">
    <link rel="stylesheet" href="static/fonts/nerdfonts.min.css">
    <script>
        // Apply the theme before first paint to avoid a dark→light
        // flash while the deferred module loads. The cookie crosses
        // subdomains (pages.subspace.pub ↔ stats.subspace.pub) where
        // localStorage would not. The module's own matchMedia
        // listener and toggle helper take over once search.js loads.
        (function () {
            function read() {
                var m = document.cookie.match(/(?:^|;\s*)subspace-theme=([^;]+)/);
                if (m) {
                    try { return decodeURIComponent(m[1]); } catch (e) { return m[1]; }
                }
                try { return localStorage.getItem('subspace-theme'); } catch (e) { return null; }
            }
            try {
                var saved = read();
                if (saved !== 'light' && saved !== 'dark') {
                    saved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-theme', saved);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body x-data="{...dashboard(), ...search()}" x-init="loadLinks(); initSearch()">
    <div class="config-error-banner" x-show="configErrors.length > 0" x-cloak>
        <div class="config-error-banner-title">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span x-text="`Config error${configErrors.length === 1 ? '' : 's'} (${configErrors.length})`"></span>
        </div>
        <ul>
            <template x-for="(msg, idx) in configErrors" :key="idx">
                <li x-text="msg"></li>
            </template>
        </ul>
    </div>
    <header>
        <h1>
            <span class="sub">sub</span><span class="space">space</span>
            <template x-if="title">
                <span><span class="title-dash">-</span> <span class="title" x-text="title"></span></span>
            </template>
        </h1>
        <span class="search-hint" @click="show()">Press <kbd>/</kbd> to search</span>
        <nav>
            <template x-for="item in nav" :key="item.url">
                <a :href="item.url" :class="{ active: item.active }" :title="item.label">
                    <template x-if="item.icon">
                        <i :class="iconClass(item.icon)"></i>
                    </template>
                    <template x-if="!item.icon">
                        <span x-text="item.label"></span>
                    </template>
                </a>
            </template>
            <button type="button" class="theme-toggle" title="Show keyboard shortcuts (?)"
                    @click="openHelp()">
                <i class="fa-solid fa-keyboard"></i>
            </button>
            <button type="button" class="theme-toggle" title="Toggle light/dark theme"
                    @click="window.subspaceToggleTheme()">
                <i class="fa-solid fa-sun theme-toggle-light"></i>
                <i class="fa-solid fa-moon theme-toggle-dark"></i>
            </button>
        </nav>
    </header>
    <main>
        <template x-for="(band, bandIdx) in pageBands()" :key="'band:' + bandIdx">
            <div :class="band.kind === 'grid' ? 'grid' : 'md-band-wrap'">
                <template x-if="band.kind === 'markdown'">
                    <section class="md md-band" x-html="band.html"></section>
                </template>
                <template x-if="band.kind === 'grid'">
                    <template x-for="cell in band.cells" :key="cell.key">
                        <section class="group"
                                 :class="cell.kind === 'markdown'
                                    ? ['md', 'md-card', 'md-cols-' + (cell.columns || 1), 'md-rows-' + (cell.rows || 1), cell.float === 'right' ? 'md-right' : '']
                                    : ''"
                                 :style="(() => {
                                    const c = cell.kind === 'list' ? cell.section.Color : (cell.kind === 'markdown' ? cell.color : '');
                                    return c ? `border-top: 2px solid ${c}; box-shadow: 0 0 12px ${c}15; background: linear-gradient(180deg, ${c}1a, transparent)` : '';
                                 })()">
                            <template x-if="cell.kind === 'markdown'">
                                <div class="md" x-html="cell.html"></div>
                            </template>
                            <template x-if="cell.kind === 'list'">
                                <div class="group-inner">
                                    <template x-if="cell.section.Icon">
                                        <i :class="iconClass(cell.section.Icon)" class="group-icon"
                                           :style="cell.section.Color ? `color: ${cell.section.Color}; text-shadow: 0 0 8px ${cell.section.Color}` : ''"></i>
                                    </template>
                                    <h2 x-text="cell.section.Name"></h2>
                                    <ul>
                                        <template x-for="(item, idx) in (cell.section.Items || cell.section.Links || [])" :key="item.Kind + ':' + idx + ':' + (item.URL || item.Name || '')">
                                            <li :class="{ 'list-subtitle-item': item.Kind === 'subtitle', 'list-md-item': item.Kind === 'markdown' }">
                                                <template x-if="item.Kind === 'subtitle'">
                                                    <h3 class="list-subtitle" x-text="item.Name"></h3>
                                                </template>
                                                <template x-if="item.Kind === 'markdown'">
                                                    <div class="md list-md" x-html="item.HTML"></div>
                                                </template>
                                                <template x-if="item.Kind !== 'subtitle' && item.Kind !== 'markdown'">
                                                    <a :href="item.URL">
                                                        <template x-if="item.Icon">
                                                            <i :class="iconClass(item.Icon)" class="link-icon"></i>
                                                        </template>
                                                        <template x-if="!item.Icon">
                                                            <span class="default-icon">&#x2022;</span>
                                                        </template>
                                                        <span class="link-text">
                                                            <span class="link-name" x-text="item.Name"></span>
                                                            <template x-if="item.Description">
                                                                <span class="link-desc" x-text="item.Description"></span>
                                                            </template>
                                                        </span>
                                                    </a>
                                                </template>
                                                <template x-if="item.Kind !== 'subtitle' && item.Kind !== 'markdown' && item.Tags && item.Tags.length">
                                                    <span class="link-tags">
                                                        <template x-for="t in item.Tags" :key="t">
                                                            <span class="tag-pill" :style="`--tag-color: ${tagColor(t)}`" x-text="tagLabel(t)"></span>
                                                        </template>
                                                    </span>
                                                </template>
                                            </li>
                                        </template>
                                    </ul>
                                    <template x-if="cell.section.Tags && cell.section.Tags.length">
                                        <div class="group-tags">
                                            <template x-for="t in cell.section.Tags" :key="t">
                                                <span class="tag-pill" :style="`--tag-color: ${tagColor(t)}`" x-text="tagLabel(t)"></span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </section>
                    </template>
                </template>
            </div>
        </template>
        <p class="empty" x-show="items.length === 0">No content configured.</p>
    </main>
    <footer x-show="footer" x-text="footer"></footer>

    <!-- Keyboard shortcut legend -->
    <template x-if="helpOpen">
        <div class="search-backdrop" @click.self="closeHelp()">
            <div class="search-dialog help-dialog">
                <div class="help-header">
                    <i class="fa-solid fa-keyboard"></i>
                    <span>Keyboard shortcuts</span>
                    <kbd>esc</kbd>
                </div>
                <div class="help-body">
                    <template x-for="group in keybindingGroups()" :key="group.scope">
                        <section class="help-group">
                            <h3 x-text="group.label"></h3>
                            <dl>
                                <template x-for="(b, idx) in group.entries" :key="group.scope + ':' + idx">
                                    <div class="help-row">
                                        <dt>
                                            <template x-for="(k, ki) in b.keys" :key="ki">
                                                <span>
                                                    <kbd x-text="k"></kbd>
                                                    <template x-if="ki < b.keys.length - 1">
                                                        <span class="help-or">or</span>
                                                    </template>
                                                </span>
                                            </template>
                                        </dt>
                                        <dd x-text="b.description"></dd>
                                    </div>
                                </template>
                            </dl>
                        </section>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- Search popup -->
    <template x-if="open">
        <div class="search-backdrop" @click.self="hide()">
            <div class="search-dialog" :class="{ flashing }" @keydown="onKeydown($event)">
                <div class="search-input-wrap">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input
                        x-ref="searchInput"
                        x-model="query"
                        @input="onInput()"
                        type="text"
                        placeholder="Search pages..."
                        autocomplete="off"
                        spellcheck="false">
                    <kbd>esc</kbd>
                </div>
                <div class="search-results" x-ref="searchResults">
                    <template x-for="(item, idx) in filteredResults()" :key="item.type + ':' + (item.url || item.label)">
                        <a :href="resultURL(item)"
                           class="search-result"
                           :class="{ selected: idx === selectedIndex, engine: item.type === 'engine' || item.type === 'engine-prefix' }"
                           @mouseenter="selectedIndex = idx"
                           @click.prevent="navigate(item)">
                            <template x-if="iconImageURL(item)">
                                <img :src="iconImageURL(item)"
                                     class="search-result-icon search-result-favicon"
                                     referrerpolicy="no-referrer"
                                     loading="lazy"
                                     @error="onFaviconError(item)"
                                     alt="">
                            </template>
                            <template x-if="!iconImageURL(item)">
                                <i :class="iconClass(item.icon, item.type)"
                                   class="search-result-icon"></i>
                            </template>
                            <div class="search-result-text">
                                <div class="search-result-label" x-text="item.label"></div>
                                <div class="search-result-meta" x-text="item.meta"></div>
                                <template x-if="item.description">
                                    <div class="search-result-desc" x-text="item.description"></div>
                                </template>
                            </div>
                            <span class="search-result-enter">&crarr;</span>
                        </a>
                    </template>
                    <div class="search-empty" x-show="filteredResults().length === 0">
                        No results
                    </div>
                </div>
                <div class="search-footer">
                    <kbd>tab</kbd> autocomplete <span>·</span> <kbd>&crarr;</kbd> open <span>·</span> <kbd>&#8984;&crarr;</kbd>/<kbd>ctrl&crarr;</kbd> new tab <span>·</span> <kbd>esc</kbd> close
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="static/search.js"></script>
    <script src="static/alpine.min.js" defer></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('dashboard', () => ({
                title: '',
                footer: '',
                items: [],
                groups: [],
                nav: [],
                tags: {},
                configErrors: [],
                async loadLinks() {
                    try {
                        const [linksResp, navResp, errorsResp] = await Promise.all([
                            fetch('api/links').then(r => r.json()),
                            fetch('api/nav').then(r => r.json()),
                            fetch('api/config-errors').then(r => r.json()).catch(() => null),
                        ]);
                        this.title = linksResp.Title || '';
                        this.footer = linksResp.Footer || '';
                        this.items = linksResp.Items || [];
                        this.groups = linksResp.Sections || [];
                        this.tags = linksResp.Tags || {};
                        this.nav = navResp || [];
                        this.configErrors = (errorsResp && errorsResp.errors) || [];

                        // Restore persisted task-list checkbox state on
                        // the next tick so Alpine has finished rendering
                        // the markdown content into the DOM. The page
                        // path keys storage so two dashboards can keep
                        // independent task state on the same browser.
                        this.$nextTick(() => {
                            const pageName = location.pathname.split('/').filter(Boolean)[0] || '';
                            window.subspaceInitTaskLists && window.subspaceInitTaskLists(pageName);
                        });
                    } catch (e) {
                        console.error('Failed to load links:', e);
                    }
                },
                pageBands() {
                    return (window.subspaceBands ? window.subspaceBands(this.items) : []);
                },
                tagColor(name) {
                    return (this.tags[name] && this.tags[name].Color) || 'var(--text-muted)';
                },
                tagLabel(name) {
                    return (this.tags[name] && this.tags[name].Alias) || name;
                },
                iconClass(icon) {
                    if (icon.startsWith('si-')) return 'si ' + icon;
                    if (icon.startsWith('fa-')) return 'fa-solid ' + icon;
                    if (icon.startsWith('mdi-')) return 'mdi ' + icon;
                    if (icon.startsWith('nf-')) return 'nf ' + icon;
                    return icon;
                }
            }));
        });
    </script>
</body>
</html>
