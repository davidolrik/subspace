<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subspace Statistics</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/fonts/fontawesome.min.css">
    <link rel="stylesheet" href="/static/fonts/simple-icons.min.css">
    <link rel="stylesheet" href="/static/fonts/materialdesignicons.min.css">
    <link rel="stylesheet" href="/static/fonts/nerdfonts.min.css">
    <script>
        // Apply the theme before first paint to avoid a flash while
        // the deferred module loads. Mirrors the helper in
        // index.html — reads the cross-subdomain cookie first.
        (function () {
            function read() {
                var m = document.cookie.match(/(?:^|;\s*)subspace-theme=([^;]+)/);
                if (m) {
                    try { return decodeURIComponent(m[1]); } catch (e) { return m[1]; }
                }
                try { return localStorage.getItem('subspace-theme'); } catch (e) { return null; }
            }
            try {
                var saved = read();
                if (saved !== 'light' && saved !== 'dark') {
                    saved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-theme', saved);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
            box-shadow: 0 0 8px rgba(0, 255, 234, 0.04);
            transition: box-shadow 0.2s ease;
        }
        .chart-card:hover {
            box-shadow: 0 0 16px rgba(0, 255, 234, 0.12), 0 0 4px rgba(0, 255, 234, 0.06);
        }
        .chart-card.wide {
            grid-column: 1 / -1;
        }
        .chart-card h2 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .chart-wrap {
            position: relative;
            height: 250px;
        }
        .chart-wrap canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .time-selector {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .time-selector button {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .time-selector button:hover {
            border-color: var(--text-muted);
            color: var(--text);
        }
        .time-selector button.active {
            border-color: var(--cyan);
            color: var(--cyan);
        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            margin-top: 1.5rem;
        }
        .top-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1rem;
        }
        .top-controls-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-right: 0.25rem;
        }
        .top-controls button {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            padding: 0.35rem 0.7rem;
            font-size: 0.78rem;
            cursor: pointer;
        }
        .top-controls button:hover {
            border-color: var(--text-muted);
            color: var(--text);
        }
        .top-controls button.active {
            border-color: var(--cyan);
            color: var(--cyan);
        }
        .top-card .top-list {
            list-style: none;
            counter-reset: top-rank;
            padding: 0;
            margin: 0;
        }
        .top-card .top-list li {
            counter-increment: top-rank;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 0.75rem;
            padding: 0.35rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        .top-card .top-list li::before {
            content: counter(top-rank) ".";
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            margin-right: 0.5rem;
            min-width: 1.5em;
        }
        .top-card .top-list li:last-child {
            border-bottom: none;
        }
        .top-card .top-name {
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .top-card .top-value {
            color: var(--cyan);
            font-variant-numeric: tabular-nums;
            font-weight: 600;
        }
        .top-card .top-empty {
            color: var(--text-muted);
            font-style: italic;
            border-bottom: none;
        }
        .top-card .top-empty::before {
            content: "";
            margin-right: 0;
            min-width: 0;
        }
        .section-title:first-of-type {
            margin-top: 0;
        }
        .live-stats {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem 1.25rem;
            min-width: 140px;
            box-shadow: 0 0 8px rgba(0, 255, 234, 0.04);
            transition: box-shadow 0.2s ease;
        }
        .stat-card:hover {
            box-shadow: 0 0 16px rgba(0, 255, 234, 0.12), 0 0 4px rgba(0, 255, 234, 0.06);
        }
        .stat-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            text-align: center;
        }
        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            text-align: center;
        }
        .upstreams-section {
            margin-bottom: 1.5rem;
        }
        .upstreams-section h2 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }
        .upstream-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.75rem;
        }
        .upstream-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 0 8px rgba(0, 255, 234, 0.04);
            transition: box-shadow 0.2s ease;
        }
        .upstream-card:hover {
            box-shadow: 0 0 16px rgba(0, 255, 234, 0.12), 0 0 4px rgba(0, 255, 234, 0.06);
        }
        .upstream-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .upstream-indicator.healthy { background: #00ff88; box-shadow: 0 0 6px rgba(0,255,136,0.4); }
        .upstream-indicator.unhealthy { background: #ff375f; box-shadow: 0 0 6px rgba(255,55,95,0.4); }
        .upstream-info { flex: 1; min-width: 0; }
        .upstream-name {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }
        .upstream-detail {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }
        .upstream-meta {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .upstream-meta .latency {
            color: var(--text);
            font-weight: 600;
        }
    </style>
</head>
<body x-data="{...statistics(), ...search()}" x-init="init(); initSearch()">
    <div class="config-error-banner" x-show="configErrors.length > 0" x-cloak>
        <div class="config-error-banner-title">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span x-text="`Config error${configErrors.length === 1 ? '' : 's'} (${configErrors.length})`"></span>
        </div>
        <ul>
            <template x-for="(msg, idx) in configErrors" :key="idx">
                <li x-text="msg"></li>
            </template>
        </ul>
    </div>
    <header>
        <h1>
            <span class="sub">sub</span><span class="space">space</span>
            <span><span class="title-dash">-</span> <span class="title">Statistics</span></span>
        </h1>
        <span class="search-hint" @click="show()">Press <kbd>/</kbd> to search</span>
        <nav>
            <template x-for="item in nav" :key="item.url">
                <a :href="item.url" :class="{ active: item.active }" :title="item.label">
                    <template x-if="item.icon">
                        <i :class="iconClass(item.icon)"></i>
                    </template>
                    <template x-if="!item.icon">
                        <span x-text="item.label"></span>
                    </template>
                </a>
            </template>
            <button type="button" class="theme-toggle" title="Show keyboard shortcuts (?)"
                    @click="openHelp()">
                <i class="fa-solid fa-keyboard"></i>
            </button>
            <button type="button" class="theme-toggle" title="Toggle light/dark theme"
                    @click="window.subspaceToggleTheme()">
                <i class="fa-solid fa-sun theme-toggle-light"></i>
                <i class="fa-solid fa-moon theme-toggle-dark"></i>
            </button>
        </nav>
    </header>
    <main>
        <h2 class="section-title">Live</h2>
        <div class="live-stats">
            <div class="stat-card">
                <div class="label">Total Connections</div>
                <div class="value" x-text="formatNumber(live.connections)"></div>
            </div>
            <div class="stat-card">
                <div class="label">Active</div>
                <div class="value" x-text="formatNumber(live.active)"></div>
            </div>
            <div class="stat-card">
                <div class="label">Upstreams</div>
                <div class="value" x-text="Object.keys(live.upstreams || {}).length"></div>
            </div>
        </div>

        <div class="upstreams-section" x-show="Object.keys(statusData.upstreams || {}).length > 0">
            <h2>Upstreams</h2>
            <div class="upstream-grid">
                <template x-for="[name, up] in sortedUpstreams()" :key="name">
                    <div class="upstream-card">
                        <div class="upstream-indicator" :class="up.healthy ? 'healthy' : 'unhealthy'"></div>
                        <div class="upstream-info">
                            <div class="upstream-name" x-text="name"></div>
                            <div class="upstream-detail">
                                <span x-text="up.type"></span>
                                <template x-if="up.address">
                                    <span> · <span x-text="up.address"></span></span>
                                </template>
                            </div>
                        </div>
                        <div class="upstream-meta">
                            <template x-if="up.latency">
                                <div class="latency" x-text="up.latency"></div>
                            </template>
                            <template x-if="up.stats">
                                <div x-text="formatNumber(up.stats.success) + ' ok'"></div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <h2 class="section-title">History</h2>
        <div class="time-selector">
            <template x-for="opt in timeOptions" :key="opt.seconds">
                <button
                    :class="{ active: duration === opt.seconds }"
                    @click="setDuration(opt.seconds)"
                    x-text="opt.label">
                </button>
            </template>
        </div>

        <div class="stats-grid">
            <div class="chart-card wide">
                <h2>Connections Over Time</h2>
                <div class="chart-wrap">
                    <canvas x-ref="connectionsChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h2>Traffic by Upstream</h2>
                <div class="chart-wrap">
                    <canvas x-ref="trafficChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h2>Protocol Breakdown</h2>
                <div class="chart-wrap">
                    <canvas x-ref="protocolChart"></canvas>
                </div>
            </div>
        </div>

        <h2 class="section-title">Top Activity</h2>
        <div class="top-controls">
            <span class="top-controls-label">Rank by:</span>
            <template x-for="opt in [
                { label: 'Total bytes', value: 'bytes_total' },
                { label: 'Bytes in',    value: 'bytes_in' },
                { label: 'Bytes out',   value: 'bytes_out' },
                { label: 'Successes',   value: 'success' },
                { label: 'Failures',    value: 'failures' },
            ]" :key="opt.value">
                <button :class="{ active: topMetric === opt.value }"
                        @click="setTopMetric(opt.value)"
                        x-text="opt.label"></button>
            </template>
        </div>

        <div class="stats-grid">
            <div class="chart-card top-card">
                <h2>Top Upstreams</h2>
                <ol class="top-list">
                    <template x-for="entry in topUpstreams" :key="entry.name">
                        <li>
                            <span class="top-name" x-text="entry.name"></span>
                            <span class="top-value" x-text="formatTopValue(entry.value)"></span>
                        </li>
                    </template>
                    <li class="top-empty" x-show="topUpstreams.length === 0">No activity yet</li>
                </ol>
            </div>
            <div class="chart-card top-card">
                <h2>Top Domains</h2>
                <ol class="top-list">
                    <template x-for="entry in topDomains" :key="entry.name">
                        <li>
                            <span class="top-name" x-text="entry.name"></span>
                            <span class="top-value" x-text="formatTopValue(entry.value)"></span>
                        </li>
                    </template>
                    <li class="top-empty" x-show="topDomains.length === 0">No activity yet</li>
                </ol>
            </div>
            <div class="chart-card top-card">
                <h2>Top Routes</h2>
                <ol class="top-list">
                    <template x-for="entry in topRoutes" :key="entry.name">
                        <li>
                            <span class="top-name" x-text="entry.name"></span>
                            <span class="top-value" x-text="formatTopValue(entry.value)"></span>
                        </li>
                    </template>
                    <li class="top-empty" x-show="topRoutes.length === 0">No activity yet</li>
                </ol>
            </div>
        </div>
    </main>
    <!-- Keyboard shortcut legend -->
    <template x-if="helpOpen">
        <div class="search-backdrop" @click.self="closeHelp()">
            <div class="search-dialog help-dialog">
                <div class="help-header">
                    <i class="fa-solid fa-keyboard"></i>
                    <span>Keyboard shortcuts</span>
                    <kbd>esc</kbd>
                </div>
                <div class="help-body">
                    <template x-for="group in keybindingGroups()" :key="group.scope">
                        <section class="help-group">
                            <h3 x-text="group.label"></h3>
                            <dl>
                                <template x-for="(b, idx) in group.entries" :key="group.scope + ':' + idx">
                                    <div class="help-row">
                                        <dt>
                                            <template x-for="(k, ki) in b.keys" :key="ki">
                                                <span>
                                                    <kbd x-text="k"></kbd>
                                                    <template x-if="ki < b.keys.length - 1">
                                                        <span class="help-or">or</span>
                                                    </template>
                                                </span>
                                            </template>
                                        </dt>
                                        <dd x-text="b.description"></dd>
                                    </div>
                                </template>
                            </dl>
                        </section>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- Search popup -->
    <template x-if="open">
        <div class="search-backdrop" @click.self="hide()">
            <div class="search-dialog" :class="{ flashing }" @keydown="onKeydown($event)">
                <div class="search-input-wrap">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input
                        x-ref="searchInput"
                        x-model="query"
                        @input="onInput()"
                        type="text"
                        placeholder="Search pages..."
                        autocomplete="off"
                        spellcheck="false">
                    <kbd>esc</kbd>
                </div>
                <div class="search-results" x-ref="searchResults">
                    <template x-for="(item, idx) in filteredResults()" :key="item.type + ':' + item.url">
                        <a :href="item.url"
                           class="search-result"
                           :class="{ selected: idx === selectedIndex }"
                           @mouseenter="selectedIndex = idx"
                           @click.prevent="navigate(item.url)">
                            <i :class="iconClass(item.icon)"
                               class="search-result-icon"></i>
                            <div class="search-result-text">
                                <div class="search-result-label" x-text="item.label"></div>
                                <div class="search-result-meta" x-text="item.meta"></div>
                                <template x-if="item.description">
                                    <div class="search-result-desc" x-text="item.description"></div>
                                </template>
                            </div>
                            <span class="search-result-enter">&crarr;</span>
                        </a>
                    </template>
                    <div class="search-empty" x-show="filteredResults().length === 0">
                        No results
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="/static/search.js"></script>
    <script src="/static/chart.min.js"></script>
    <script src="/static/alpine.min.js" defer></script>
    <script>
        const chartColors = {
            cyan:   'rgba(0, 255, 234, 0.8)',
            pink:   'rgba(255, 41, 117, 0.8)',
            green:  'rgba(0, 255, 136, 0.8)',
            blue:   'rgba(30, 144, 255, 0.8)',
            amber:  'rgba(255, 183, 0, 0.8)',
            violet: 'rgba(187, 134, 252, 0.8)',
            red:    'rgba(255, 55, 95, 0.8)',
            yellow: 'rgba(255, 234, 0, 0.8)',
        };
        const colorList = Object.values(chartColors);

        // Read chart-relevant CSS variables so charts pick up the
        // current theme on each (re)build. Called when constructing
        // chart options and again on themechange.
        function cssVar(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }
        function chartTheme() {
            return {
                bg:        cssVar('--surface') || '#161b22',
                border:    cssVar('--border') || '#30363d',
                text:      cssVar('--text') || '#c9d1d9',
                textMuted: cssVar('--text-muted') || '#8b949e',
            };
        }

        function buildTooltipStyle() {
            const t = chartTheme();
            return {
            tooltip: {
                mode: 'index',
                intersect: false,
                backgroundColor: t.bg,
                borderColor: t.border,
                borderWidth: 1,
                titleColor: t.text,
                titleFont: { weight: '600', size: 12 },
                bodyColor: t.textMuted,
                bodyFont: { size: 11 },
                padding: 10,
                cornerRadius: 6,
                usePointStyle: true,
                callbacks: {
                    labelColor: function(ctx) {
                        const bg = ctx.dataset.backgroundColor;
                        const border = ctx.dataset.borderColor;
                        // Use the element's background color; fall back to
                        // borderColor only for line/area charts where
                        // backgroundColor is the fill, not the line.
                        let color;
                        if (Array.isArray(bg)) {
                            color = bg[ctx.dataIndex];
                        } else if (border && border !== 'transparent' && border !== bg) {
                            color = border;
                        } else {
                            color = bg;
                        }
                        return {
                            borderColor: color,
                            backgroundColor: color,
                            borderRadius: 2,
                        };
                    }
                }
            }
            };
        }
        let tooltipStyle = buildTooltipStyle();

        function buildDefaultChartOpts() {
            const t = chartTheme();
            return {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                legend: { labels: { color: t.textMuted, font: { size: 11 } } },
                ...buildTooltipStyle(),
            },
            scales: {
                x: {
                    ticks: { color: t.textMuted, font: { size: 10 } },
                    grid: { color: t.border }
                },
                y: {
                    ticks: { color: t.textMuted, font: { size: 10 } },
                    grid: { color: t.border },
                    beginAtZero: true
                }
            }
            };
        }
        let defaultChartOpts = buildDefaultChartOpts();

        // Draw a vertical crosshair line at the hover position
        const verticalLinePlugin = {
            id: 'verticalLine',
            afterDraw(chart) {
                const yAxis = chart.scales.y;
                if (!yAxis) return;
                const active = chart.tooltip?.getActiveElements();
                if (!active || active.length === 0) return;
                const x = active[0].element.x;
                const ctx = chart.ctx;
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, yAxis.top);
                ctx.lineTo(x, yAxis.bottom);
                ctx.lineWidth = 1;
                ctx.strokeStyle = 'rgba(201, 209, 217, 0.3)';
                ctx.stroke();
                ctx.restore();
            }
        };
        Chart.register(verticalLinePlugin);

        Chart.defaults.color = '#8b949e';

        // Chart instances stored outside Alpine to avoid reactive proxy wrapping
        const chartInstances = {};

        // Preserve dataset hidden state across chart data updates
        function updateChartData(chart, newData) {
            const hidden = {};
            if (chart.data && chart.data.datasets) {
                chart.data.datasets.forEach((ds, i) => {
                    const meta = chart.getDatasetMeta(i);
                    if (meta.hidden !== null) hidden[ds.label] = meta.hidden;
                });
            }
            chart.data = newData;
            newData.datasets.forEach((ds, i) => {
                if (ds.label in hidden) {
                    chart.getDatasetMeta(i).hidden = hidden[ds.label];
                }
            });
            chart.update('none');
        }

        function formatBytesJS(b) {
            if (b >= (1 << 30)) return (b / (1 << 30)).toFixed(1) + ' GiB';
            if (b >= (1 << 20)) return (b / (1 << 20)).toFixed(1) + ' MiB';
            if (b >= (1 << 10)) return (b / (1 << 10)).toFixed(1) + ' KiB';
            return b + ' B';
        }

        document.addEventListener('alpine:init', () => {
            Alpine.data('statistics', () => ({
                live: { connections: 0, active: 0, upstreams: {}, protocols: {} },
                statusData: { upstreams: {} },
                nav: [],
                configErrors: [],
                duration: 3600,
                refreshTimer: null,
                // Top-N reports — one ranking per kind (upstreams,
                // domains, routes). Metric is shared across all three
                // and selectable by the user.
                topMetric: 'bytes_total',
                topUpstreams: [],
                topDomains: [],
                topRoutes: [],
                timeOptions: [
                    { label: '5m', seconds: 300 },
                    { label: '1h', seconds: 3600 },
                    { label: '6h', seconds: 21600 },
                    { label: '24h', seconds: 86400 },
                    { label: '7d', seconds: 604800 },
                    { label: '14d', seconds: 1209600 },
                    { label: '30d', seconds: 2592000 },
                    { label: '90d', seconds: 7776000 },
                    { label: '180d', seconds: 15552000 },
                    { label: '365d', seconds: 31536000 },
                ],

                async init() {
                    await this.refresh();
                    this.refreshTimer = setInterval(() => this.refresh(), 5000);
                    this._themeListener = () => this.onThemeChange();
                    window.addEventListener('subspace:themechange', this._themeListener);
                },

                destroy() {
                    if (this.refreshTimer) clearInterval(this.refreshTimer);
                    if (this._themeListener) window.removeEventListener('subspace:themechange', this._themeListener);
                },

                onThemeChange() {
                    // Rebuild chart option presets from the new CSS
                    // variables, push them onto the live charts, and
                    // re-render. We deliberately don't re-fetch — the
                    // dataset stays the same, only the colors change.
                    tooltipStyle = buildTooltipStyle();
                    defaultChartOpts = buildDefaultChartOpts();
                    for (const key of Object.keys(chartInstances)) {
                        const chart = chartInstances[key];
                        if (!chart) continue;
                        // Preserve any per-chart customisations (e.g.
                        // stacked axes) while updating shared colors.
                        const opts = chart.options;
                        if (opts && opts.scales) {
                            for (const ax of Object.values(opts.scales)) {
                                if (ax.ticks) ax.ticks.color = chartTheme().textMuted;
                                if (ax.grid) ax.grid.color = chartTheme().border;
                            }
                        }
                        if (opts && opts.plugins) {
                            if (opts.plugins.legend && opts.plugins.legend.labels) {
                                opts.plugins.legend.labels.color = chartTheme().textMuted;
                            }
                            if (opts.plugins.tooltip) {
                                Object.assign(opts.plugins.tooltip, buildTooltipStyle().tooltip);
                            }
                        }
                        // Pie chart slices use the surface color as the
                        // separator between segments — refresh that too.
                        // Other chart types' borderColor encodes the
                        // line/series color and must not be touched.
                        if (key === 'protocol') {
                            for (const ds of chart.data.datasets || []) {
                                ds.borderColor = chartTheme().bg;
                            }
                        }
                        chart.update('none');
                    }
                },

                setDuration(d) {
                    this.duration = d;
                    this.refresh();
                },

                async refresh() {
                    const topURL = (kind) => `/api/top?kind=${kind}&metric=${this.topMetric}&duration=${this.duration}&n=10`;
                    const [
                        liveData, timeseriesData, statusData, navData, errorsData,
                        topUp, topDom, topRt,
                    ] = await Promise.all([
                        fetch('/api/snapshot').then(r => r.json()).catch(() => null),
                        fetch(`/api/timeseries?duration=${this.duration}`).then(r => r.json()).catch(() => null),
                        fetch('/api/status').then(r => r.json()).catch(() => null),
                        fetch('/api/nav').then(r => r.json()).catch(() => null),
                        fetch('/api/config-errors').then(r => r.json()).catch(() => null),
                        fetch(topURL('upstreams')).then(r => r.json()).catch(() => null),
                        fetch(topURL('domains')).then(r => r.json()).catch(() => null),
                        fetch(topURL('routes')).then(r => r.json()).catch(() => null),
                    ]);

                    if (liveData) this.live = liveData;
                    if (statusData) this.statusData = statusData;
                    if (navData) this.nav = navData;
                    this.configErrors = (errorsData && errorsData.errors) || [];
                    this.topUpstreams = (topUp && topUp.top) || [];
                    this.topDomains = (topDom && topDom.top) || [];
                    this.topRoutes = (topRt && topRt.top) || [];

                    // Update charts after Alpine has finished processing DOM
                    // updates from the reactive data changes above
                    this.$nextTick(() => {
                        const points = (timeseriesData && timeseriesData.points) || [];
                        this.updateCharts(points);
                    });
                },

                setTopMetric(metric) {
                    this.topMetric = metric;
                    this.refresh();
                },

                formatTopValue(v) {
                    if (this.topMetric.startsWith('bytes')) return formatBytesJS(v);
                    return v.toLocaleString();
                },

                sortedUpstreams() {
                    const entries = Object.entries(this.statusData.upstreams || {});
                    return entries.sort((a, b) => {
                        // Healthy before unhealthy
                        if (a[1].healthy !== b[1].healthy) return a[1].healthy ? -1 : 1;
                        // Direct last
                        if (a[0] === 'direct') return 1;
                        if (b[0] === 'direct') return -1;
                        return a[0].localeCompare(b[0]);
                    });
                },

                updateCharts(points) {
                    const labels = points.map(p => {
                        const d = new Date(p.timestamp);
                        if (this.duration <= 3600) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        if (this.duration <= 86400) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        return d.toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    });

                    this.updateConnectionsChart(labels, points);
                    this.updateTrafficChart(labels, points);
                    this.updateProtocolChart();
                },

                updateConnectionsChart(labels, points) {
                    const ctx = this.$refs.connectionsChart;

                    // Compute new connections per interval (delta of cumulative counter)
                    const newConns = points.map((p, i) => {
                        if (i === 0) return 0;
                        const delta = p.connections - points[i - 1].connections;
                        return delta > 0 ? delta : 0;
                    });

                    // Compute errors per interval (delta of summed error counts)
                    const errorTotals = points.map(p => {
                        const errs = p.errors || {};
                        return Object.values(errs).reduce((sum, v) => sum + v, 0);
                    });
                    const errorDeltas = errorTotals.map((v, i) => {
                        if (i === 0) return 0;
                        const d = v - errorTotals[i - 1];
                        return d > 0 ? d : 0;
                    });

                    const data = {
                        labels,
                        datasets: [
                            {
                                label: 'New',
                                data: newConns,
                                borderColor: chartColors.cyan,
                                backgroundColor: 'rgba(0, 255, 234, 0.1)',
                                fill: true,
                                tension: 0.3,
                                pointRadius: 0,
                            },
                            {
                                label: 'Active',
                                data: points.map(p => p.active),
                                borderColor: chartColors.green,
                                backgroundColor: 'rgba(0, 255, 136, 0.1)',
                                fill: true,
                                tension: 0.3,
                                pointRadius: 0,
                            },
                            {
                                label: 'Errors',
                                data: errorDeltas,
                                borderColor: chartColors.red,
                                backgroundColor: 'rgba(255, 55, 95, 0.1)',
                                fill: true,
                                tension: 0.3,
                                pointRadius: 0,
                            }
                        ]
                    };
                    if (chartInstances.connections) {
                        updateChartData(chartInstances.connections, data);
                    } else {
                        chartInstances.connections = new Chart(ctx, {
                            type: 'line',
                            data,
                            options: defaultChartOpts
                        });
                    }
                },

                updateTrafficChart(labels, points) {
                    const ctx = this.$refs.trafficChart;
                    const upstreamNames = new Set();
                    points.forEach(p => Object.keys(p.upstreams || {}).forEach(n => upstreamNames.add(n)));

                    const datasets = [...upstreamNames].map((name, i) => {
                        // Compute per-interval throughput (delta of cumulative bytes)
                        const totals = points.map(p => {
                            const u = (p.upstreams || {})[name];
                            return u ? u.bytes_in + u.bytes_out : 0;
                        });
                        const deltas = totals.map((v, j) => {
                            if (j === 0) return 0;
                            const d = v - totals[j - 1];
                            return d > 0 ? d : 0;
                        });
                        return {
                            label: name,
                            data: deltas,
                            backgroundColor: colorList[i % colorList.length],
                            borderColor: 'transparent',
                        };
                    });

                    const data = { labels, datasets };
                    if (chartInstances.traffic) {
                        updateChartData(chartInstances.traffic, data);
                    } else {
                        chartInstances.traffic = new Chart(ctx, {
                            type: 'bar',
                            data,
                            options: {
                                ...defaultChartOpts,
                                plugins: {
                                    ...defaultChartOpts.plugins,
                                    legend: { ...defaultChartOpts.plugins.legend, position: 'bottom' },
                                    tooltip: {
                                        ...tooltipStyle.tooltip,
                                        callbacks: {
                                            ...tooltipStyle.tooltip.callbacks,
                                            label: (ctx) => ` ${ctx.dataset.label}: ${this.formatBytes(ctx.parsed.y)}`
                                        }
                                    }
                                },
                                scales: {
                                    ...defaultChartOpts.scales,
                                    x: { ...defaultChartOpts.scales.x, stacked: true },
                                    y: {
                                        ...defaultChartOpts.scales.y,
                                        stacked: true,
                                        ticks: {
                                            ...defaultChartOpts.scales.y.ticks,
                                            callback: v => this.formatBytes(v)
                                        }
                                    }
                                }
                            }
                        });
                    }
                },

                updateProtocolChart() {
                    const ctx = this.$refs.protocolChart;
                    const protocols = this.live.protocols || {};
                    const protoNames = Object.keys(protocols).filter(k => protocols[k] > 0);

                    const data = {
                        labels: protoNames,
                        datasets: [{
                            data: protoNames.map(k => protocols[k]),
                            backgroundColor: protoNames.map((_, i) => colorList[i % colorList.length]),
                            borderColor: chartTheme().bg,
                            borderWidth: 2,
                        }]
                    };

                    if (chartInstances.protocol) {
                        updateChartData(chartInstances.protocol, data);
                    } else {
                        chartInstances.protocol = new Chart(ctx, {
                            type: 'pie',
                            data,
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: {
                                        position: 'bottom',
                                        labels: { color: '#8b949e', font: { size: 11 }, padding: 15 }
                                    },
                                    ...tooltipStyle,
                                }
                            }
                        });
                    }
                },

                formatNumber(n) {
                    if (n === undefined || n === null) return '0';
                    return n.toLocaleString();
                },

                iconClass(icon) {
                    if (icon.startsWith('si-')) return 'si ' + icon;
                    if (icon.startsWith('fa-')) return 'fa-solid ' + icon;
                    if (icon.startsWith('mdi-')) return 'mdi ' + icon;
                    if (icon.startsWith('nf-')) return 'nf ' + icon;
                    return icon;
                },

                formatBytes(bytes) {
                    if (bytes === 0) return '0';
                    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
                    const i = Math.floor(Math.log(bytes) / Math.log(1024));
                    return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
                }
            }));
        });
    </script>
</body>
</html>
