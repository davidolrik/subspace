version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X go.olrik.dev/subspace/cmd.Version={{.Version}}

brews:
  - directory: Formula
    repository:
      owner: davidolrik
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://subspace.olrik.dev/
    description: Transparent proxy with upstream routing
    license: MIT
    install: |
      bin.install "subspace"

      generate_completions_from_executable(bin/"subspace", "completion")
    service: |
      run [opt_bin/"subspace", "serve"]
      keep_alive true
      log_path var/"log/subspace.log"
      error_log_path var/"log/subspace.log"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
